<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THermes — Agentic Trading</title>
<style>
/* ===== SCANIA TEGEL DESIGN SYSTEM ===== */
:root {
  --tds-bg:#0E1013; --tds-header:#041E42; --tds-surface-01:#15181D; --tds-surface-02:#1C222B;
  --tds-surface-03:#242C37; --tds-text-strong:#F6F7F9; --tds-text-subtle:#AAC9F6;
  --tds-border:#3A517C; --tds-blue:#2A6ECF; --tds-blue-light:#4A89F3; --tds-blue-dark:#16417F;
  --tds-success:#65BDA5; --tds-warning:#F1C21B; --tds-danger:#EA4851;
  --radius-card:4px; --radius-field:4px; --radius-full:9999px;
  --font-ui:'Scania Sans','Scania Sans CY',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --font-display:'Scania Sans Headline','Scania Sans',system-ui,sans-serif;
  --font-compact:'Scania Sans Semi Condensed','Scania Sans Condensed',Arial,sans-serif;
  --space-8:8px; --space-12:12px; --space-16:16px; --space-24:24px;
  --motion:cubic-bezier(0.4,0,0,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow:hidden;font-family:var(--font-ui);font-size:13px;line-height:1.5;letter-spacing:-0.01em;color:var(--tds-text-strong);background:var(--tds-bg);}
.app{display:grid;grid-template-rows:48px 1fr;height:100vh;}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:12px;padding:0 var(--space-16);background:var(--tds-header);border-bottom:1px solid rgba(58,81,124,0.4);z-index:20;}
.topbar .logo{font-family:var(--font-display);font-size:14px;font-weight:700;text-transform:uppercase;color:var(--tds-text-strong);}
.topbar .logo span{background:#fff;color:var(--tds-header);padding:2px 8px;border-radius:var(--radius-card);font-size:11px;margin-right:6px;}
.topbar .sep{flex:1;}
.topbar .model-select{display:flex;align-items:center;gap:6px;padding:3px 8px;border-radius:var(--radius-card);border:1px solid var(--tds-border);background:var(--tds-surface-02);font-family:var(--font-compact);font-size:11px;color:var(--tds-text-subtle);cursor:pointer;transition:all 0.15s var(--motion);}
.topbar .model-select:hover{border-color:var(--tds-blue);}
.topbar .model-select select{background:transparent;border:none;color:var(--tds-blue-light);font-family:var(--font-compact);font-size:11px;cursor:pointer;outline:none;}
.topbar .dot{width:6px;height:6px;border-radius:50%;background:var(--tds-success);box-shadow:0 0 6px var(--tds-success);margin-right:4px;}
.topbar .acct{font-family:var(--font-compact);font-size:11px;color:var(--tds-text-subtle);}
.topbar .acct strong{color:var(--tds-text-strong);}
.topbar .settings-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--tds-border);border-radius:var(--radius-card);color:var(--tds-text-subtle);cursor:pointer;font-size:16px;transition:all 0.15s var(--motion);}
.topbar .settings-btn:hover{background:var(--tds-surface-03);color:var(--tds-text-strong);}
.hamburger{display:none;width:32px;height:32px;align-items:center;justify-content:center;background:none;border:1px solid var(--tds-border);border-radius:var(--radius-card);color:var(--tds-text-subtle);cursor:pointer;font-size:16px;}

/* MARKET BAR */
.market-bar{display:flex;gap:12px;padding:5px var(--space-16);background:var(--tds-surface-02);border-bottom:1px solid rgba(58,81,124,0.2);overflow-x:auto;font-family:var(--font-compact);font-size:10px;color:var(--tds-text-subtle);white-space:nowrap;}
.market-bar strong{color:var(--tds-text-strong);margin-right:4px;}
.change-up{color:var(--tds-success);}
.change-down{color:var(--tds-danger);}

/* MAIN BODY */
.main{display:grid;grid-template-columns:260px 1fr 380px;overflow:hidden;height:100%;}
.main>div{overflow:hidden;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;background:var(--tds-surface-01);border-right:1px solid rgba(58,81,124,0.3);overflow:hidden;z-index:10;}
.sidebar-section{padding:var(--space-12) var(--space-16);border-bottom:1px solid rgba(58,81,124,0.2);}
.sidebar-section:first-child{flex:1;min-height:0;overflow-y:auto;}
.sidebar-section:last-child{flex:0 0 auto;max-height:150px;overflow:auto;}
.sidebar-section h3{font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--tds-text-subtle);margin-bottom:var(--space-8);}
.sidebar-tabs{display:flex;gap:4px;margin-bottom:var(--space-12);}
.sidebar-tab{flex:1;text-align:center;padding:5px 0;font-family:var(--font-compact);font-size:11px;font-weight:600;color:var(--tds-text-subtle);background:transparent;border:1px solid transparent;border-radius:var(--radius-card);cursor:pointer;}
.sidebar-tab.active{color:var(--tds-text-strong);background:var(--tds-surface-03);border-color:var(--tds-border);}
.sidebar-tab:hover{background:var(--tds-surface-02);}
.wl-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;margin:2px 0;border-radius:var(--radius-card);cursor:pointer;border:1px solid transparent;transition:all 0.15s var(--motion);}
.wl-item:hover{background:var(--tds-surface-02);border-color:rgba(58,81,124,0.3);}
.wl-item.sel{background:rgba(42,110,207,0.12);border-color:var(--tds-blue);}
.wl-item .sym{font-family:var(--font-compact);font-weight:700;font-size:12px;color:var(--tds-text-strong);}
.wl-item .name{font-size:10px;color:var(--tds-text-subtle);}
.wl-item .pr{font-family:var(--font-compact);font-weight:600;font-size:12px;text-align:right;}
.wl-item .ch{font-size:10px;}

/* CHAT */
.chat-area{display:flex;flex-direction:column;min-height:0;height:100%;background:radial-gradient(ellipse at 50% 20%,rgba(42,110,207,0.06) 0%,transparent 58%);overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:var(--space-16);display:flex;flex-direction:column;gap:12px;min-height:0;}

/* HERMES-STYLE COMPOSER */
.composer{padding:12px 16px;border-top:1px solid rgba(58,81,124,0.25);background:var(--tds-surface-01);}
.hermes-composer{margin:0;padding:8px 14px 8px;background:var(--tds-surface-01);border-top:1px solid rgba(58,81,124,0.35);flex:0 0 auto;}
.goals{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.hermes-goals{margin-top:8px;margin-bottom:0;opacity:.82;}
.goal-tag{padding:2px 7px;border-radius:var(--radius-full);font-family:var(--font-compact);font-size:9px;font-weight:600;background:rgba(42,110,207,0.15);color:var(--tds-blue-light);border:1px solid rgba(42,110,207,0.3);cursor:pointer;}
.goal-tag:hover{background:rgba(42,110,207,0.25);}
.goal-tag.active{background:var(--tds-blue);color:#fff;}
.c-row{display:flex;gap:8px;}
.c-input{flex:1;padding:8px 12px;background:var(--tds-surface-02);border:1px solid var(--tds-border);border-radius:var(--radius-field);color:var(--tds-text-strong);font-family:var(--font-ui);font-size:13px;outline:none;resize:none;min-height:36px;max-height:100px;}
.hermes-input{width:100%;min-height:28px;max-height:90px;padding:0 0 2px 0;background:transparent;border:0;border-radius:0;font-size:14px;line-height:1.35;color:var(--tds-text-strong);}
.c-input:focus{border-color:var(--tds-blue);box-shadow:0 0 0 2px rgba(42,110,207,0.15);}
.hermes-input:focus{box-shadow:none;border-color:transparent;}
.c-input::placeholder{color:var(--tds-text-subtle);opacity:0.55;}
.send-btn{padding:8px 16px;background:var(--tds-blue);color:#fff;border:none;border-radius:var(--radius-field);font-family:var(--font-compact);font-weight:600;font-size:12px;cursor:pointer;transition:all 0.15s var(--motion);}
.send-btn:hover{background:var(--tds-blue-light);}
.composer-toolbar{display:flex;align-items:center;gap:7px;min-height:30px;}
.composer-icons{display:flex;align-items:center;gap:8px;}
.composer-icon{width:22px;height:22px;border:0;background:transparent;color:var(--tds-text-subtle);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.85;}
.composer-icon:hover{color:var(--tds-blue-light);}
.toolbar-sep{width:1px;height:20px;background:rgba(170,201,246,.35);margin:0 3px;}
.composer-pill{height:26px;display:inline-flex;align-items:center;gap:6px;padding:0 10px;border:1px solid rgba(170,201,246,.28);background:rgba(28,34,43,.72);border-radius:999px;color:var(--tds-text-subtle);font-family:var(--font-compact);font-weight:700;font-size:11px;cursor:pointer;}
.composer-pill:hover{border-color:var(--tds-blue);color:var(--tds-text-strong);}
.composer-pill.compact{border-color:transparent;background:transparent;padding:0 4px;}
.composer-spacer{flex:1;}
.token-meter{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 50%,rgba(42,110,207,.22),rgba(28,34,43,.9));border:3px solid rgba(170,201,246,.18);font-family:var(--font-display);font-size:9px;font-weight:700;color:var(--tds-text-subtle);cursor:pointer;}
.send-arrow{width:32px;height:32px;border:0;border-radius:6px;background:var(--tds-blue);color:#fff;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.send-arrow:hover{background:var(--tds-blue-light);}

/* DETAIL PANEL */
.detail{background:var(--tds-surface-01);border-left:1px solid rgba(58,81,124,0.3);display:flex;flex-direction:column;overflow-y:auto;transition:all 0.25s var(--motion);}
.detail-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(58,81,124,0.2);}
.detail-hdr h2{font-family:var(--font-display);font-size:16px;font-weight:700;}
.close-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--tds-border);border-radius:var(--radius-card);color:var(--tds-text-subtle);cursor:pointer;}
.close-btn:hover{background:var(--tds-surface-03);color:var(--tds-text-strong);}
.d-price{display:flex;align-items:baseline;gap:8px;padding:12px 16px;}
.d-price .p{font-family:var(--font-display);font-size:24px;font-weight:700;}
.d-price .ch{font-family:var(--font-compact);font-size:13px;}

/* VERDICT */
.verdict-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:var(--radius-full);font-family:var(--font-display);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.verdict-badge.buy{background:rgba(101,189,165,0.15);color:var(--tds-success);border:1px solid rgba(101,189,165,0.4);}
.verdict-badge.sell{background:rgba(234,72,81,0.15);color:var(--tds-danger);border:1px solid rgba(234,72,81,0.4);}
.verdict-badge.hold{background:rgba(241,194,27,0.12);color:var(--tds-warning);border:1px solid rgba(241,194,27,0.35);}
.verdict-badge.avoid{background:rgba(234,72,81,0.08);color:var(--tds-danger);border:1px solid rgba(234,72,81,0.25);}
.verdict-badge.data{background:rgba(58,81,124,0.20);color:var(--tds-text-subtle);border:1px solid rgba(170,201,246,0.28);}
.vdot{width:7px;height:7px;border-radius:50%;}
.verdict-badge.buy .vdot{background:var(--tds-success);box-shadow:0 0 6px var(--tds-success);}
.verdict-badge.sell .vdot{background:var(--tds-danger);box-shadow:0 0 6px var(--tds-danger);}
.verdict-badge.hold .vdot{background:var(--tds-warning);box-shadow:0 0 6px var(--tds-warning);}
.verdict-badge.avoid .vdot{background:var(--tds-danger);}
.verdict-badge.data .vdot{background:var(--tds-text-subtle);}

/* ENTRY/EXIT STRIP */
.ee-strip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:8px 12px;margin:0 12px 8px;background:var(--tds-surface-02);border:1px solid rgba(58,81,124,0.25);border-radius:var(--radius-card);}
.ee-item{text-align:center;padding:4px 0;}
.ee-item .el{font-family:var(--font-compact);font-size:8px;font-weight:600;text-transform:uppercase;color:var(--tds-text-subtle);}
.ee-item .ev{font-family:var(--font-display);font-size:14px;font-weight:700;}
.ee-item .es{font-family:var(--font-compact);font-size:8px;color:var(--tds-text-subtle);}
.ee-item.entry .ev{color:var(--tds-blue-light);}
.ee-item.stop .ev{color:var(--tds-danger);}
.ee-item.target .ev{color:var(--tds-success);}
.ee-item.maxbuy .ev{color:var(--tds-warning);}

/* TABS */
.d-tabs{display:flex;gap:0;flex-wrap:wrap;padding:0 16px;border-bottom:1px solid rgba(58,81,124,0.2);}
.d-tab{padding:8px 12px;font-family:var(--font-compact);font-size:10px;font-weight:600;color:var(--tds-text-subtle);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.d-tab.active{color:var(--tds-blue-light);border-bottom-color:var(--tds-blue);}
.d-tab:hover{color:var(--tds-text-strong);}
.d-content{padding:12px 16px;flex:1;overflow-y:auto;}

/* CARDS */
.card{background:var(--tds-surface-02);border:1px solid rgba(58,81,124,0.25);border-radius:var(--radius-card);padding:12px;margin-bottom:12px;}
.card h4{font-family:var(--font-compact);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--tds-text-subtle);margin-bottom:6px;}
.row{display:flex;justify-content:space-between;padding:4px 0;font-family:var(--font-compact);font-size:11px;border-bottom:1px solid rgba(58,81,124,0.1);}
.row .lbl{color:var(--tds-text-subtle);}
.row .val{color:var(--tds-text-strong);font-weight:600;}

/* PATTERNS */
.pattern-badge{display:inline-block;padding:3px 8px;border-radius:var(--radius-full);font-family:var(--font-compact);font-size:9px;font-weight:600;margin:2px;}
.pattern-badge.bullish{background:rgba(101,189,165,0.12);color:var(--tds-success);border:1px solid rgba(101,189,165,0.3);}
.pattern-badge.bearish{background:rgba(234,72,81,0.12);color:var(--tds-danger);border:1px solid rgba(234,72,81,0.3);}
.pattern-badge.neu{background:rgba(58,81,124,0.2);color:var(--tds-text-subtle);border:1px solid rgba(58,81,124,0.3);}

/* SIGNALS */
.sig{display:inline-block;padding:4px 8px;border-radius:var(--radius-card);font-family:var(--font-compact);font-size:9px;font-weight:600;text-transform:uppercase;border:1px solid;}
.sig.buy-sig{background:rgba(101,189,165,0.1);color:var(--tds-success);border-color:rgba(101,189,165,0.3);}
.sig.sell-sig{background:rgba(234,72,81,0.1);color:var(--tds-danger);border-color:rgba(234,72,81,0.3);}
.sig.neu-sig{background:rgba(58,81,124,0.15);color:var(--tds-text-subtle);border-color:rgba(58,81,124,0.25);}

/* SCORE BAR */
.score-bar{display:flex;height:8px;border-radius:var(--radius-full);overflow:hidden;margin:8px 0;background:rgba(58,81,124,0.3);}
.score-fill{transition:width 0.5s var(--motion);border-radius:var(--radius-full);}
.score-fill.strong{background:var(--tds-success);}
.score-fill.moderate{background:var(--tds-blue-light);}
.score-fill.weak{background:var(--tds-warning);}
.score-fill.poor{background:var(--tds-danger);}

/* SENTIMENT BAR */
.senti-bar{display:flex;height:6px;border-radius:var(--radius-full);overflow:hidden;margin:6px 0;}
.senti-bar .bull{background:var(--tds-success);}
.senti-bar .neut{background:var(--tds-border);}
.senti-bar .bear{background:var(--tds-danger);}

/* CHART CANVAS */
.chart-c{width:100%;height:280px;}

/* TRADE FORM */
.tf-row{display:flex;gap:8px;margin-bottom:8px;}
.tf-field{flex:1;display:flex;flex-direction:column;gap:2px;}
.tf-field label{font-family:var(--font-compact);font-size:9px;font-weight:600;text-transform:uppercase;color:var(--tds-text-subtle);}
.tf-field input,.tf-field select{padding:6px 8px;background:var(--tds-surface-03);border:1px solid var(--tds-border);border-radius:var(--radius-field);color:var(--tds-text-strong);font-family:var(--font-compact);font-size:12px;outline:none;}
.tf-field input:focus,.tf-field select:focus{border-color:var(--tds-blue);}
.trade-btn{width:100%;padding:7px 0;font-family:var(--font-compact);font-size:12px;font-weight:700;border:none;border-radius:var(--radius-field);cursor:pointer;}
.trade-btn.buy-btn{background:var(--tds-success);color:#0E1013;}
.trade-btn.sell-btn{background:var(--tds-danger);color:#fff;}
.trade-btn:hover{filter:brightness(1.15);}

/* SETTINGS MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s var(--motion);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--tds-surface-01);border:1px solid var(--tds-border);border-radius:8px;width:88vw;max-width:860px;max-height:84vh;display:flex;flex-direction:column;overflow:hidden;font-size:12px;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(58,81,124,0.2);}
.modal-hdr h2{font-family:var(--font-display);font-size:15px;font-weight:700;}
.modal-tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid rgba(58,81,124,0.2);overflow-x:auto;}
.modal-tab{padding:7px 12px;font-family:var(--font-compact);font-size:10px;font-weight:700;color:var(--tds-text-subtle);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.modal-tab.active{color:var(--tds-blue-light);border-bottom-color:var(--tds-blue);}
.modal-body{flex:1;overflow-y:auto;padding:12px 14px;}
.modal-body label{display:block;font-family:var(--font-compact);font-size:10px;font-weight:600;text-transform:uppercase;color:var(--tds-text-subtle);margin-bottom:4px;}
.modal-body input,.modal-body select{width:100%;padding:6px 8px;background:var(--tds-surface-03);border:1px solid var(--tds-border);border-radius:var(--radius-field);color:var(--tds-text-strong);font-family:var(--font-compact);font-size:12px;margin-bottom:10px;outline:none;}
.modal-body input:focus{border-color:var(--tds-blue);}
.modal-body .provider-card{background:var(--tds-surface-02);border:1px solid rgba(58,81,124,0.25);border-radius:var(--radius-card);padding:9px 10px;margin-bottom:8px;}
.provider-card .p-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.provider-card .p-name{font-family:var(--font-display);font-size:12px;font-weight:700;}
.provider-card .toggle{position:relative;width:36px;height:20px;cursor:pointer;}
.toggle input{display:none;}
.toggle .slider{position:absolute;inset:0;background:var(--tds-surface-03);border-radius:10px;transition:0.2s;}
.toggle input:checked+.slider{background:var(--tds-blue);}
.toggle .slider::after{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:0.2s;}
.toggle input:checked+.slider::after{transform:translateX(16px);}
.btn-sm{padding:5px 10px;font-family:var(--font-compact);font-size:10px;font-weight:600;border-radius:var(--radius-card);border:1px solid var(--tds-border);background:transparent;color:var(--tds-text-subtle);cursor:pointer;margin-right:4px;}
.btn-sm:hover{background:var(--tds-surface-03);}
.btn-sm.danger{color:var(--tds-danger);border-color:rgba(234,72,81,0.4);}
.btn-sm.danger:hover{background:rgba(234,72,81,0.12);}
.btn-sm.primary{background:var(--tds-blue);color:#fff;border-color:var(--tds-blue);}
.btn-sm.primary:hover{background:var(--tds-blue-light);}
.btn-sm.success{background:var(--tds-success);color:#0E1013;border-color:var(--tds-success);}

/* TOAST */
.toast-c{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{padding:10px 16px;border-radius:var(--radius-card);font-family:var(--font-compact);font-size:12px;font-weight:600;color:#0E1013;animation:slideIn 0.3s var(--motion);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.toast.ok{background:var(--tds-success);}
.toast.err{background:var(--tds-danger);color:#fff;}
@keyframes slideIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}

/* HERMES-LIKE SIDE PANEL */
.side-panel{position:fixed;top:48px;right:0;bottom:0;width:420px;max-width:92vw;background:var(--tds-surface-01);border-left:1px solid var(--tds-border);z-index:90;box-shadow:-8px 0 28px rgba(0,0,0,.35);display:flex;flex-direction:column;font-size:12px;}
.side-panel.hidden{display:none;}
.panel-head{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--tds-border);}
.panel-head h3{font-family:var(--font-display);font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--tds-text-subtle);}
.panel-body{flex:1;overflow:auto;padding:14px 16px;}
.panel-search{width:100%;padding:10px 12px;border:1px solid var(--tds-border);border-radius:10px;background:var(--tds-bg);color:var(--tds-text-strong);font-size:14px;margin-bottom:14px;outline:none;}
.panel-search:focus{border-color:var(--tds-blue);box-shadow:0 0 0 2px rgba(42,110,207,.16);}
.panel-section-title{font-family:var(--font-display);font-size:12px;font-weight:800;letter-spacing:.06em;color:var(--tds-text-subtle);text-transform:uppercase;margin:18px 0 8px;}
.panel-list-item{display:flex;align-items:center;gap:9px;padding:6px 4px;border-radius:6px;color:var(--tds-text-subtle);font-size:11px;cursor:pointer;}
.panel-list-item:hover{background:var(--tds-surface-02);color:var(--tds-text-strong);}
.panel-list-item strong{color:var(--tds-text-subtle);font-size:12px;min-width:96px;}
.panel-toggle{width:26px;height:14px;border-radius:999px;border:1px solid var(--tds-blue);background:rgba(42,110,207,.28);position:relative;flex:none;}
.panel-toggle.off{border-color:rgba(170,201,246,.24);background:rgba(58,81,124,.28);}
.panel-toggle::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;right:2px;top:1px;background:#AAC9F6;}
.panel-toggle.off::after{right:auto;left:2px;background:#61718a;}
.panel-log{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;line-height:1.5;color:var(--tds-text-subtle);background:var(--tds-bg);border:1px solid rgba(58,81,124,.35);border-radius:6px;padding:10px;}

/* HERMES-LIKE DROPDOWN POPOVERS */
.dropdown-pop{position:fixed;z-index:160;width:320px;max-height:430px;background:var(--tds-surface-02);border:1px solid var(--tds-border);border-radius:10px;box-shadow:0 14px 42px rgba(0,0,0,.45);overflow:hidden;}
.dropdown-pop.hidden{display:none;}
.drop-head{padding:9px 10px;border-bottom:1px solid var(--tds-border);font-size:11px;font-weight:800;color:var(--tds-text-subtle);text-transform:uppercase;letter-spacing:.04em;}
.drop-search{width:calc(100% - 20px);margin:10px;padding:7px 9px;background:var(--tds-bg);border:1px solid var(--tds-border);border-radius:7px;color:var(--tds-text-strong);font-size:12px;outline:none;}
.drop-list{max-height:340px;overflow:auto;}
.drop-item{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border-top:1px solid rgba(58,81,124,.18);cursor:pointer;color:var(--tds-text-subtle);}
.drop-item:hover,.drop-item.active{background:#22304a;color:var(--tds-text-strong);}
.drop-item strong{display:block;color:var(--tds-text-strong);font-size:13px;line-height:1.2;}
.drop-item small{display:block;color:var(--tds-text-subtle);font-size:10px;line-height:1.25;margin-top:2px;word-break:break-all;}
.drop-icon{width:18px;text-align:center;opacity:.8;flex:none;}
.timeframe-row{display:flex;gap:5px;flex-wrap:wrap;margin:0 0 10px;}
.timeframe-btn{padding:3px 7px;border-radius:999px;border:1px solid rgba(42,110,207,.35);background:rgba(42,110,207,.10);color:var(--tds-blue-light);font:700 9px var(--font-compact);cursor:pointer;}
.timeframe-btn.active,.timeframe-btn:hover{background:var(--tds-blue);color:white;}
.loading-inline{display:inline-flex;align-items:center;gap:8px;color:var(--tds-text-subtle);font-size:11px;}
.spinner{width:14px;height:14px;border:2px solid rgba(170,201,246,.25);border-top-color:var(--tds-blue-light);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--tds-blue-light);box-shadow:0 0 0 0 rgba(74,137,243,.7);animation:pulse 1.3s infinite;display:inline-block;}
@keyframes pulse{70%{box-shadow:0 0 0 8px rgba(74,137,243,0)}100%{box-shadow:0 0 0 0 rgba(74,137,243,0)}}
/* LOADING SPLASH */
.app-loader{position:fixed;inset:0;z-index:999;background:var(--tds-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity 0.4s var(--motion);}
.app-loader.done{opacity:0;pointer-events:none;}
.app-loader .loader-logo{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--tds-text-strong);letter-spacing:.04em;text-transform:uppercase;}
.app-loader .loader-logo span{background:#fff;color:var(--tds-header);padding:3px 12px;border-radius:var(--radius-card);font-size:22px;margin-right:8px;}
.app-loader .loader-bar{width:180px;height:4px;background:rgba(42,110,207,.15);border-radius:2px;overflow:hidden;}
.app-loader .loader-fill{height:100%;width:30%;background:var(--tds-blue);border-radius:2px;animation:loadSweep 1.5s ease-in-out infinite;}
@keyframes loadSweep{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.app-loader .loader-text{font-family:var(--font-compact);font-size:12px;color:var(--tds-text-subtle);}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--tds-border);border-radius:3px;}

/* ORDER BOOK */
.ob-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:5px 12px;font-family:var(--font-compact);font-size:11px;border-bottom:1px solid rgba(58,81,124,0.1);}
.ob-row.bid{color:var(--tds-success);}
.ob-row.ask{color:var(--tds-danger);}
.ob-hdr{color:var(--tds-text-subtle);font-size:10px;font-weight:600;}

/* MOBILE */
@media(max-width:768px){
  .app{height:100dvh;grid-template-rows:48px minmax(0,1fr);}
  .app>div:nth-child(2){min-height:0;}
  .main{grid-template-columns:1fr;}
  .chat-area{position:fixed;right:-100%;top:48px;bottom:0;width:380px;max-width:92vw;z-index:50;transition:right 0.25s var(--motion);box-shadow:-8px 0 28px rgba(0,0,0,0.4);}
  .chat-area.open{right:0;}
  .detail{overflow-y:auto;}
  .chat-msgs{min-height:0;flex:1 1 auto;padding:10px 12px;}
  .msg{max-width:96%;}
  .msg-c{font-size:12px;padding:8px 10px;}
  .hermes-composer{flex:0 0 auto;padding:7px 10px calc(7px + env(safe-area-inset-bottom));}
  .hermes-input{min-height:24px;max-height:68px;font-size:13px;line-height:1.25;}
  .composer-toolbar{min-height:28px;gap:5px;overflow-x:auto;padding-bottom:1px;}
  .composer-icons{gap:5px;}
  .composer-icon{width:20px;height:20px;font-size:12px;flex:0 0 auto;}
  .toolbar-sep{height:18px;margin:0 2px;}
  .composer-pill{height:24px;padding:0 8px;font-size:10px;gap:4px;flex:0 0 auto;}
  .composer-pill.compact{padding:0 4px;}
  .token-meter{width:22px;height:22px;font-size:8px;border-width:3px;flex:0 0 auto;}
  .send-arrow{width:30px;height:30px;font-size:17px;flex:0 0 auto;}
  .hermes-goals{gap:5px;margin-top:6px;max-height:52px;overflow:auto;}
  .goal-tag{font-size:8px;padding:2px 6px;flex:0 0 auto;}
  .sidebar{position:fixed;left:-280px;top:48px;bottom:0;width:280px;z-index:50;transition:left 0.25s var(--motion);box-shadow:4px 0 20px rgba(0,0,0,0.5);}
  .sidebar.open{left:0;}
  .hamburger{display:flex;}
  .detail{position:fixed;right:-100%;top:48px;bottom:0;width:100%;z-index:50;transition:right 0.25s var(--motion);}
  .detail.open{right:0;}
  .topbar .model-select{font-size:10px;padding:2px 6px;}
  .topbar .model-select select{font-size:10px;max-width:80px;}
  .ee-strip{margin:0 8px 8px;padding:6px 10px;font-size:10px;}
  .ee-item .ev{font-size:13px;}
  .d-tabs{overflow-x:auto;padding:0 8px;}
  .d-tab{font-size:9px;padding:6px 8px;}
  .modal{width:95vw;max-height:90vh;}
}
</style>
</head>
<body>
<div class="app-loader" id="appLoader">
  <div class="loader-logo"><span>TH</span>ermes</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-text">Connecting to Hermes agent…</div>
</div>
<div class="app" id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="logo"><span>TH</span>ermes</div>
    <div class="sep"></div>
    <select id="modelSelect" onchange="changeModel(this.value)" style="display:none"><option value="">Loading…</option></select>
    <div class="acct" id="acctDisplay">A/C <strong>—</strong></div>
    <button class="settings-btn" id="settingsBtn" onclick="openSettings('marketdata')" title="Settings">⚙</button>
    <span class="acct" id="hermesStatus" style="display:none"></span>
  </div>

  <div style="display:flex;flex-direction:column;overflow:hidden;">
    <div class="market-bar" id="marketBar"></div>
    <div class="main" id="mainLayout">
      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-tabs">
            <div class="sidebar-tab active" onclick="switchSB('watchlist')">WATCHLIST</div>
            <div class="sidebar-tab" onclick="switchSB('portfolio')">PORTFOLIO</div>
          </div>
          <div id="watchTools" style="margin-bottom:8px">
            <div style="display:flex;gap:4px;margin-bottom:5px"><input id="symbolSearch" class="panel-search" style="margin:0;padding:6px 8px;font-size:11px" placeholder="Search/add symbol..." oninput="searchSymbols(this.value)"><button class="btn-sm" onclick="toggleWatchEdit()">Edit</button></div>
            <div id="symbolResults" style="display:none;border:1px solid rgba(58,81,124,.25);border-radius:6px;max-height:150px;overflow:auto;background:var(--tds-surface-02)"></div>
          </div>
          <div id="wlContainer"></div>
          <div id="pfContainer" style="display:none;"></div>
        </div>
        <div class="sidebar-section" style="flex:1;overflow-y:auto;">
          <h3>INDICES</h3>
          <div id="idxContainer"></div>
        </div>
      </div>

      <!-- DETAIL (center panel) -->
      <div class="detail" id="detail"></div>

      <!-- CHAT (right panel) -->
      <div class="chat-area" onclick="closeMobilePanels()">
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="composer hermes-composer">
          <textarea class="c-input hermes-input" id="cInput" placeholder="Message THermes Agent..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
          <div class="composer-toolbar">
            <div class="composer-icons">
              <button class="composer-icon" onclick="openFilePicker()" title="Attach">📎</button>
              <button class="composer-icon" onclick="openDropdown('prompts', this)" title="Saved prompts">🔖</button>
              <button class="composer-icon" onclick="toast('Voice input hook will use Hermes voice extension when enabled','ok')" title="Voice">🎙</button>
            </div>
            <div class="toolbar-sep"></div>
            <button class="composer-pill" onclick="openDropdown('profiles', this)" title="Profile">♙ <span id="composerProfileLabel">default</span>⌄</button>
            <button class="composer-pill" onclick="openDropdown('workspaces', this)" title="Workspace">📁 <span id="composerWorkspaceLabel">Home</span>⌄</button>
            <button class="composer-pill" onclick="openDropdown('models', this)" title="Model">⚙ <span id="composerModelLabel">gpt-5.5</span>⌄</button>
            <button class="composer-pill compact" onclick="openDropdown('reasoning', this)" title="Reasoning">◐ <span id="composerReasoningLabel">Medium</span></button>
            <div class="composer-spacer"></div>
            <div class="token-meter" onclick="openSettings('tasklist')" title="Context meter / task list">6</div>
            <button class="send-arrow" onclick="sendMsg()" title="Send">↑</button>
          </div>
          <div class="goals hermes-goals" id="goalTags">
            <span class="goal-tag" onclick="setGoal('scan_breakouts')">Scan Breakouts</span>
            <span class="goal-tag" onclick="setGoal('analyze_watchlist')">Analyze Watchlist</span>
            <span class="goal-tag" onclick="setGoal('fundamental_scan')">Fundamental Scan</span>
            <span class="goal-tag" onclick="setGoal('sentiment')">Sentiment Scan</span>
            <span class="goal-tag" onclick="setGoal('portfolio_review')">Portfolio Review</span>
            <span class="goal-tag" onclick="setGoal('day_trade')">Day Trade Setup</span>
          </div>
        </div>
      </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsOverlay" class="modal-overlay" style="display:none;"></div>
<div id="sidePanel" class="side-panel hidden"></div>
<div id="dropdownPop" class="dropdown-pop hidden"></div>
<input id="fileInput" type="file" multiple style="display:none" onchange="handleFiles(this.files)">

<!-- TOAST -->
<div class="toast-c" id="toastC"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const S={watchlist:[],portfolio:{cash:124500,holdings:[]},indices:[],marketStatus:{live:false,source:'fallback'},models:{groups:[],default_model:'',active_provider:''},settings:{},selectedStock:null,sidebarTab:'watchlist',detailTab:'chart',activeGoal:null,chartTf:'1d',watchEdit:false,enriched:JSON.parse(localStorage.getItem('thermes.enriched')||'{}')};

async function loadEnriched(){try{S.enriched={...S.enriched,...(await api('/enrichment'))};localStorage.setItem('thermes.enriched',JSON.stringify(S.enriched||{}));}catch(e){console.warn('Backend enrichment load failed',e);}}
async function saveEnrichedSymbol(symbol){localStorage.setItem('thermes.enriched',JSON.stringify(S.enriched||{}));try{await api(`/enrichment/${encodeURIComponent(symbol)}`,{method:'PUT',body:JSON.stringify({data:S.enriched[symbol]||{}})});}catch(e){console.warn('Backend enrichment save failed',e);}}
function saveEnriched(){localStorage.setItem('thermes.enriched',JSON.stringify(S.enriched||{}));}
function mergeEnriched(rows){return (rows||[]).map(r=>S.enriched?.[r.symbol]?{...r,...S.enriched[r.symbol]}:r);}

// ═══════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════
const API='/api';
async function api(url,opts={}){const r=await fetch(API+url,{headers:{'Content-Type':'application/json'},...opts});if(!r.ok)throw new Error(await r.text());return r.json();}

// ═══════════════════════════════════════════════
// INIT — fetches Hermes models + settings
// ═══════════════════════════════════════════════
async function init(){
  const statusEl = document.getElementById('hermesStatus');
  statusEl.textContent = 'Connecting…';
  try{
    await loadEnriched();
    const[wl,idx,pf,status,models,settings,brokers]=await Promise.all([
      api('/market/watchlist'),api('/market/indices'),api('/trade/portfolio'),api('/market/status'),
      api('/models'),api('/settings'),api('/brokers')
    ]);
    S.watchlist=mergeEnriched(wl);S.indices=idx;S.portfolio=pf;
    S.marketStatus=status;
    S.models=models;S.settings=settings;
    // Store broker user for display
    if(brokers?.zerodha?.user_id)S._brokerUser=brokers.zerodha.user_id;
    const provCount=models.groups?.length||0;
    statusEl.innerHTML=`<span class="dot"></span>Hermes (${provCount} providers)`;
  }catch(e){
    console.error('Init failed:',e);
    statusEl.innerHTML=`<span style="color:var(--tds-danger)">⚠ Hermes offline</span>`;
    useEmbeddedData();
  }
  buildModelSelect();
  renderMarketBar();renderWatchlist();renderPortfolio();renderIndices();
  updateAccountDisplay();
  welcomeMsg();
  setTimeout(()=>selectStock('NIITMTS'),800);
  setTimeout(()=>autoEnrichPortfolio(),1500);
  // Dismiss loading splash
  const loader=document.getElementById('appLoader');
  if(loader){loader.classList.add('done');setTimeout(()=>loader.remove(),500);}
}

function useEmbeddedData(){
  S.watchlist=[{symbol:'NIITMTS',name:'NIIT Learning Systems',ltp:246.33,change:1.74,changePct:0.71,o:247.00,h:261.51,l:241.55,pc:244.59,vol:1449000,avgVol:739000,pe:13.95,high52:443.90,low52:203.30,eps:17.66,mcap:3390,sector:'Education',sentiment:{bull:62,neutral:23,bear:15}},{symbol:'TCS',name:'Tata Consultancy',ltp:3782.60,change:-66.15,changePct:-1.72,o:3850,h:3875,l:3760,pc:3848.75,vol:2100000,avgVol:1800000,pe:31.2,high52:4250,low52:3150,eps:121,mcap:1385000,sector:'IT Services',sentiment:{bull:55,neutral:28,bear:17}},{symbol:'INFY',name:'Infosys Ltd',ltp:1564.20,change:-38.10,changePct:-2.38,o:1600,h:1615,l:1555,pc:1602.30,vol:3800000,avgVol:3200000,pe:26.8,high52:1820,low52:1320,eps:58.4,mcap:648000,sector:'IT Services',sentiment:{bull:48,neutral:30,bear:22}},{symbol:'RELIANCE',name:'Reliance Industries',ltp:2845.50,change:-12.80,changePct:-0.45,o:2860,h:2875,l:2830,pc:2858.30,vol:5100000,avgVol:4800000,pe:24.5,high52:3200,low52:2320,eps:116,mcap:1924000,sector:'Oil & Gas',sentiment:{bull:58,neutral:25,bear:17}},{symbol:'ITC',name:'ITC Ltd',ltp:428.75,change:-12.05,changePct:-2.77,o:440,h:442,l:426,pc:440.80,vol:8200000,avgVol:7500000,pe:26.1,high52:520,low52:380,eps:16.4,mcap:535000,sector:'FMCG',sentiment:{bull:40,neutral:35,bear:25}},{symbol:'HDFCBANK',name:'HDFC Bank',ltp:1678.40,change:-42.60,changePct:-2.48,o:1720,h:1725,l:1670,pc:1721,vol:6500000,avgVol:5800000,pe:20.8,high52:1850,low52:1380,eps:80.7,mcap:1278000,sector:'Banking',sentiment:{bull:52,neutral:30,bear:18}},{symbol:'SBIN',name:'State Bank of India',ltp:762.30,change:-28.40,changePct:-3.59,o:790,h:792,l:758,pc:790.70,vol:9200000,avgVol:7800000,pe:10.4,high52:910,low52:560,eps:73.3,mcap:680000,sector:'Banking',sentiment:{bull:45,neutral:28,bear:27}},{symbol:'YESBANK',name:'Yes Bank',ltp:21.25,change:-0.50,changePct:-2.29,o:21.80,h:21.95,l:21.10,pc:21.75,vol:45000000,avgVol:38000000,pe:18.5,high52:32,low52:15,eps:1.15,mcap:62000,sector:'Banking',sentiment:{bull:30,neutral:35,bear:35}}];
  S.indices=[{name:'SENSEX',value:'79,284',change:'-2.11%',down:true},{name:'NIFTY 50',value:'24,128',change:'-2.18%',down:true},{name:'BANK NIFTY',value:'51,402',change:'-2.84%',down:true},{name:'INDIA VIX',value:'16.8',change:'+8.4%',down:false}];
  S.portfolio={cash:124500,holdings:[{symbol:'NIITMTS',qty:120,avg:238.50,ltp:246.33},{symbol:'TCS',qty:15,avg:3540,ltp:3782.60},{symbol:'ITC',qty:200,avg:442,ltp:428.75},{symbol:'INFY',qty:40,avg:1485,ltp:1564.20}]};
}

// ═══════════════════════════════════════════════
// MODEL SELECTOR — shows real Hermes models
// ═══════════════════════════════════════════════
function buildModelSelect(){
  const sel=document.getElementById('modelSelect');
  if(!sel)return;
  const groups=S.models.groups||[];
  if(!groups.length){sel.innerHTML='<option>No models — check Hermes</option>';return;}
  let html='';
  groups.forEach(g=>{
    html+=`<optgroup label="${g.provider}">`;
    (g.models||[]).forEach(m=>{
      const selMark=m.id===S.models.default_model?' selected':'';
      html+=`<option value="${m.id}"${selMark}>${m.label||m.id}</option>`;
    });
    html+='</optgroup>';
  });
  sel.innerHTML=html;
  const label=document.getElementById('composerModelLabel');
  if(label){
    const chosen=sel.options[sel.selectedIndex];
    label.textContent=(chosen?.textContent||S.models.default_model||'model').replace(/^💬\s*/, '').slice(0,22);
  }
}

async function changeModel(modelId){
  if(!modelId)return;
  // Save to Hermes settings as default model
  try{
    const parts=modelId.split('/');
    const provider=parts.length>1?parts[0]:S.models.active_provider;
    const model=parts.length>1?parts.slice(1).join('/'):modelId;
    await api('/settings',{method:'POST',body:JSON.stringify({default_model:modelId,default_model_provider:provider})});
    toast(`Model → ${modelId}`,'ok');
    S.models.default_model=modelId;
    const label=document.getElementById('composerModelLabel');
    const opt=document.querySelector(`#modelSelect option[value="${CSS.escape(modelId)}"]`);
    if(label)label.textContent=(opt?.textContent||modelId).slice(0,22);
  }catch(e){console.warn('Model switch failed:',e);}
}

// ═══════════════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════════════
function renderWatchlist(){
  const tools=document.getElementById('watchTools'); if(tools) tools.style.display=S.sidebarTab==='watchlist'?'block':'none';
  document.getElementById('wlContainer').innerHTML=S.watchlist.map((s,i)=>{
    const cls=s.symbol===S.selectedStock?' sel':'';
    const cc=s.change>=0?'change-up':'change-down';
    const sg=s.change>=0?'+':'';
    const dot=verdictDot(s);
    const edit=S.watchEdit?`<div style="display:flex;gap:2px;margin-left:6px"><button class="btn-sm" onclick="event.stopPropagation();moveWatch('${s.symbol}',-1)">↑</button><button class="btn-sm" onclick="event.stopPropagation();moveWatch('${s.symbol}',1)">↓</button><button class="btn-sm danger" onclick="event.stopPropagation();removeWatch('${s.symbol}')">×</button></div>`:'';
    return `<div class="wl-item${cls}" onclick="selectStock('${s.symbol}')"><div style="display:flex;align-items:center;gap:6px">${dot}<div><div class="sym">${s.symbol}</div><div class="name">${s.name||''}</div></div></div><div style="display:flex;align-items:center"><div style="text-align:right"><div class="pr">₹${Number(s.ltp||0).toFixed(s.ltp<100?2:0)}</div><div class="ch ${cc}">${sg}${Number(s.changePct||0).toFixed(2)}%</div></div>${edit}</div></div>`;
  }).join('');
}

function verdictDot(s){
  const v=computeVerdict(s);
  const colors={buy:'#65BDA5',sell:'#EA4851',hold:'#F1C21B',avoid:'#EA4851',data:'#61718a'};

function computeVerdict(s){
  if(s.researchVerdict)return String(s.researchVerdict).toLowerCase().includes('buy')?'buy':String(s.researchVerdict).toLowerCase().includes('sell')?'sell':String(s.researchVerdict).toLowerCase().includes('avoid')?'avoid':'hold';
  if(!hasReliableAnalysis(s))return 'data';
  let score=0;const vr=s.vol/s.avgVol;const nh=(s.ltp/s.h)*100;
  if(nh>97&&vr>1.5)score+=3;else if(nh>95&&vr>1.2)score+=2;else if(vr>2)score-=1;
  if(s.change>=0)score+=1;else score-=1;
  const se=s.sentiment||{bull:50,bear:20};
  if(se.bull>55)score+=2;else if(se.bull>45)score+=1;
  if(se.bear>30)score-=2;
  if(s.pe<15)score+=2;else if(s.pe<25)score+=1;else score-=1;
  const dfh=(s.high52-s.ltp)/s.high52;if(dfh>0.4)score+=1;
  if(score>=5)return'buy';if(score>=2)return'hold';if(score>=-1)return'avoid';return'sell';
}
function hasReliableAnalysis(s){return Number(s.pe)>0 && Number(s.high52)>0 && s.sentiment && (s.sentiment.bull||0)>0;}

function computeEE(s){
  // Use enriched technical data if available, otherwise compute from intraday
  if(s.researchEntry||s.researchStop||s.researchTarget){
    const entry=Number(s.researchEntry||s.ltp);
    const stop=Number(s.researchStop||entry*0.95);
    const target=Number(s.researchTarget||entry*1.08);
    const maxBuy=s.researchMaxBuy?Number(s.researchMaxBuy):target;
    return{entry,stop,target,maxBuy};
  }
  const pivot=(s.h+s.l+s.ltp)/3;s1=2*pivot-s.h;r1=2*pivot-s.l;
  const entry=Math.max(s1,s.ltp*0.985);
  const stop=entry*(s.pe<15?0.94:0.96);
  const target=Math.min(r1,entry*1.08);
  const maxBuy=target;
  return{entry,stop,target,maxBuy};
}

function renderTechnical(s){
  const range=s.h-s.l,pivot=(s.h+s.l+s.ltp)/3,r1=2*pivot-s.l,r2=pivot+range,s1=2*pivot-s.h,s2=pivot-range;
  const vr=s.vol/s.avgVol,nh=(s.ltp/s.h)*100,bodyPct=Math.abs(s.ltp-s.o)/(s.o||1)*100,upWick=(s.h-Math.max(s.o,s.ltp))/(range||1)*100,loWick=(Math.min(s.o,s.ltp)-s.l)/(range||1)*100;
  const ptrns=[];if(bodyPct<0.15&&upWick>15&&loWick>15)ptrns.push({n:'Doji — Indecision',t:'neu'});
  if(loWick>30&&loWick>upWick*2)ptrns.push({n:'Hammer — Bullish Reversal',t:'bullish'});
  if(upWick>30&&upWick>loWick*2)ptrns.push({n:'Shooting Star — Bearish',t:'bearish'});
  if(bodyPct>1.5&&s.ltp>=s.o&&vr>1.3)ptrns.push({n:'Bullish Marubozu',t:'bullish'});

  const revG=s.symbol==='NIITMTS'?18.2:8+Math.random()*12,profG=s.symbol==='NIITMTS'?3.2:2+Math.random()*8;

async function sendMsg(opts={}){
  const input=document.getElementById('cInput');const text=(opts.textOverride||input.value).trim();if(!text)return;
  if(!opts.hideUser&&!opts.silent)addMsg('user',opts.userLabel||text);input.value='';input.style.height='auto';
  // Create agent message placeholder for streaming
  const c=document.getElementById('chatMsgs');
  const d=document.createElement('div');d.className='msg agent';d.id='streaming-msg';
  d.innerHTML=`<div class="msg-av ag">🤖</div><div><div class="msg-c" id="streaming-content"></div></div>`;
  if(!opts.silent){c.appendChild(d);c.scrollTop=c.scrollHeight;}
  const sc=document.getElementById('streaming-content');
  try{
    // Phase 1: Start chat
    let chatSessionId=opts.session_id;
    if(opts.silent && !chatSessionId){
      try{const s=await api('/session/new',{method:'POST',body:JSON.stringify({})});chatSessionId=s.session?.session_id;}catch(e){console.warn('silent session create failed',e);}
    }
    const start=await api('/chat/start',{method:'POST',body:JSON.stringify({message:text,model:S.models.default_model||undefined,session_id:chatSessionId||undefined})});
    // Phase 2: SSE stream
    const streamUrl=`${API}/chat/stream?stream_id=${encodeURIComponent(start.stream_id)}`;
    const evtSource=new EventSource(streamUrl);
    let fullText='';
    evtSource.addEventListener('token',e=>{const t=JSON.parse(e.data);fullText+=t.text||'';if(!opts.silent&&sc){sc.innerHTML=fmt(fullText);c.scrollTop=c.scrollHeight;}});
    let finished=false;
    const finish=()=>{if(finished)return;finished=true;evtSource.close();if(!opts.silent)d.removeAttribute('id');if(opts.onDone)opts.onDone(fullText);};
    evtSource.addEventListener('done',finish);
    evtSource.addEventListener('error',()=>{evtSource.close();if(!fullText){sc.innerHTML='<em>No response from agent.</em>';d.removeAttribute('id');}});
    evtSource.addEventListener('stream_end',finish);
  }catch(e){console.warn('Chat error:',e);if(!opts.silent){d.remove();addMsg('agent',`**⚠️ Hermes Agent Error**\n\nCould not reach the Hermes agent on port 8787. Make sure Hermes WebUI is running.\n\n**Error:** ${e.message}`);} if(opts.onError)opts.onError(e);}
}

async function runEnrichment(symbol,{silent=true,force=false}={}){
  const existing=S.enriched?.[symbol];
  if(existing&&!force&&existing.researchedAt&&Date.now()-existing.researchedAt<6*60*60*1000)return;
  markResearchStatus(symbol,'Fetching fundamentals from screener.in…');
  try{
    const data=await api(`/enrich/${encodeURIComponent(symbol)}`);
    if(!data||!data.pe&&!data.technical?.success){
      markResearchStatus(symbol,'No data found for this symbol');
      return;
    }
    applyResearchData(symbol,data);
    markResearchStatus(symbol,'Analysis refreshed from screener.in + technicals + news');
  }catch(e){
    markResearchStatus(symbol,'Analysis fetch failed');
    console.warn('Enrich failed',symbol,e);
  }
}

function applyResearchData(symbol,data){
  let s=S.watchlist.find(w=>w.symbol===symbol);
  if(!s)return;
  const funda=data.fundamental||{};
  const tech=data.technical||{};
  const senti=data.sentiment||{};

  s.name=data.name||funda.name||s.name;
  // Only update fields that have actual non-null, non-zero values from enrichment
  function safeNum(v){return v!=null&&v!==0&&!isNaN(Number(v))?Number(v):null;}
  const np=safeNum(data.pe)??safeNum(funda.pe); if(np!=null)s.pe=np;
  const ne=safeNum(data.eps)??safeNum(funda.eps); if(ne!=null)s.eps=ne;
  const nm=safeNum(data.mcap)??safeNum(funda.mcap); if(nm!=null)s.mcap=nm;
  const nh=safeNum(data.high52)??safeNum(funda.high52); if(nh!=null)s.high52=nh;
  const nl=safeNum(data.low52)??safeNum(funda.low52); if(nl!=null)s.low52=nl;
  s.sector=funda.sector||s.sector||'';
  if(senti.sentiment)s.sentiment={bull:Number(senti.sentiment.bull||0),neutral:Number(senti.sentiment.neutral||0),bear:Number(senti.sentiment.bear||0)};
  if(funda.roce)s.roce=Number(funda.roce);
  if(funda.roe)s.roe=Number(funda.roe);
  if(funda.debt_equity)s.debtEquity=Number(funda.debt_equity);
  if(funda.promoter_holding)s.promoterHolding=Number(funda.promoter_holding);
  if(funda.revenue)s.revenue=Number(funda.revenue);
  if(funda.profit)s.profit=Number(funda.profit);

  s.researchVerdict=tech.recommendation||data.recommendation||'HOLD';
  s.researchEntry=data.entry||tech.entry;
  s.researchStop=data.stop_loss||tech.stop_loss||(tech.entry?Number(tech.entry)*0.95:null);
  s.researchTarget=data.target||tech.target;
  s.researchMaxBuy=data.max_buy||tech.max_buy||data.target||tech.target;
  s.researchNotes=`screener.in · ${tech.source||'computed'} technicals · ${senti.source||'news'} sentiment`;
  s.fundamentals_available=!!(s.pe||s.eps||s.mcap);

  S.enriched[symbol]={...S.enriched[symbol]||{},
    name:s.name,pe:s.pe,eps:s.eps,mcap:s.mcap,high52:s.high52,low52:s.low52,
    sector:s.sector,sentiment:s.sentiment,
      researchVerdict:s.researchVerdict,researchEntry:s.researchEntry,
      researchStop:s.researchStop,researchTarget:s.researchTarget,
      researchMaxBuy:s.researchMaxBuy,
    researchNotes:s.researchNotes,fundamentals_available:s.fundamentals_available,
    researchedAt:Date.now()};
  saveEnrichedSymbol(symbol);
  renderWatchlist();renderPortfolio();
  if(S.selectedStock===symbol)renderDetail(symbol);
}

function setGoal(goal){

function closePanel(){document.getElementById('sidePanel').classList.add('hidden');}
function panelShell(title, body){
  const p=document.getElementById('sidePanel');
  p.classList.remove('hidden');
  p.innerHTML=`<div class="panel-head"><h3>${title}</h3><button class="close-btn" onclick="closePanel()">✕</button></div><div class="panel-body">${body}</div>`;
}
async function openPanel(kind){
  panelShell(kind.toUpperCase(), '<div style="color:var(--tds-text-subtle)">Loading…</div>');
  try{
    if(kind==='skills')return renderSkillsPanel(await api('/skills'));
    if(kind==='memory')return renderMemoryPanel(await api('/memory'));
    if(kind==='todos')return renderTodosPanel();
    if(kind==='logs')return renderLogsPanel(await api('/logs?tail=80'));
    if(kind==='profiles')return renderProfilesPanel(await api('/profiles'));
    if(kind==='workspaces')return renderWorkspacesPanel(await api('/workspaces'));
    if(kind==='models')return renderModelsPanel(S.models);
    if(kind==='reasoning')return renderReasoningPanel(await api('/reasoning'));
  }catch(e){panelShell(kind.toUpperCase(), `<div style="color:var(--tds-danger)">Failed to load ${kind}: ${esc(e.message)}</div>`);}
}
function groupBy(arr, fn){return arr.reduce((m,x)=>{const k=fn(x)||'(GENERAL)';(m[k]||(m[k]=[])).push(x);return m;},{});}
function renderSkillsPanel(data){
  const skills=data.skills||[];
  const groups=groupBy(skills,s=>(s.category||'(GENERAL)').toUpperCase());
  let html=`<input class="panel-search" placeholder="Search skills..." oninput="filterPanelItems(this.value)">`;
  Object.entries(groups).forEach(([cat,items])=>{
    html+=`<div class="panel-section-title">⌄ ${cat} (${items.length})</div>`;
    html+=items.map(s=>`<div class="panel-list-item" data-filter="${esc((s.name+' '+s.description).toLowerCase())}"><button class="panel-toggle ${s.disabled?'off':''}" onclick="toggleSkill('${esc(s.name)}', ${s.disabled})"></button><strong>${esc(s.name)}</strong><span>${esc(s.description||'')}</span></div>`).join('');
  });
  panelShell('SKILLS', html);
}

    .then(p=>{S._providers=p.providers||p||[]; if(document.getElementById('settingsOverlay').style.display!=='none' && document.querySelector('.modal-tab.active')?.dataset.tab==='providers') renderSettings('providers');})

function renderSettings(tab){
  document.getElementById('settingsOverlay').style.display='flex';
  const overlay=document.getElementById('settingsOverlay');
  overlay.innerHTML=`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-hdr"><h2>⚙ Settings</h2><button class="close-btn" onclick="closeSettings()">✕</button></div>

async function loadSettingsTab(tab){
  const body=document.querySelector('.modal-body'); if(!body)return;
  try{
    if(tab==='brokers'){const d=await api('/brokers');body.innerHTML=settingsBrokersHtml(d);}

  }catch(e){body.innerHTML=`<div style="color:var(--tds-danger)">Failed to load ${tab}: ${esc(e.message)}</div>`;}
}

function renderSettingsContent(tab){
  switch(tab){
    case'marketdata':return'<div style="color:var(--tds-text-subtle)">Loading market data providers…</div>';

  const body={broker};
  if(broker==='zerodha'){
    body.api_key=document.getElementById('zerodhaKey')?.value||'';
    body.api_secret=document.getElementById('zerodhaSecret')?.value||'';
    body.user_id=document.getElementById('zerodhaUser')?.value||'';
  }else{
    body.api_key=document.getElementById('angelKey')?.value||'';
    body.client_id=document.getElementById('angelClient')?.value||'';
    body.password=document.getElementById('angelPassword')?.value||'';
  }
  await api(`/brokers/${broker}`,{method:'PUT',body:JSON.stringify(body)});
  toast(`${broker} API settings saved`,'ok');
}
async function testBroker(broker){
  try{
    if(broker==='zerodha') await saveBrokerConfig('zerodha');
    if(broker==='angel_broking') await saveBrokerConfig('angel_broking');
    const r=await api(`/brokers/${broker}/test`,{method:'POST'});
    if(r.status==='login_required'&&r.login_url){toast('Opening Kite login…','ok');window.open(r.login_url,'_blank');return;}
    toast(r.message||'Connected','ok');
  }catch(e){toast(`Connection failed: ${e.message}`,'err');}
}
async function activateAgent(type){await api('/agents/activate',{method:'PUT',body:JSON.stringify({agent_type:type})});toast(`Agent: ${type}`,'ok');}
async function toggleAutonomous(enabled){await api('/agents/autonomous',{method:'PUT',body:JSON.stringify({enabled})});toast(`Autonomous ${enabled?'ON':'OFF'}`,'ok');}

// ═══════════════════════════════════════════════
// MOBILE
// ═══════════════════════════════════════════════
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function closeMobilePanels(){if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('detail').classList.remove('open');}}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function toast(msg,type){const c=document.getElementById('toastC');const d=document.createElement('div');d.className=`toast ${type}`;d.textContent=msg;c.appendChild(d);setTimeout(()=>d.remove(),3500);}

// ═══════════════════════════════════════════════
// COMPOSER AUTO-RESIZE
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  init();
  const inp=document.getElementById('cInput');
  inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,160)+'px';});
  const settingsBtn=document.getElementById('settingsBtn');
  if(settingsBtn)settingsBtn.addEventListener('click',(e)=>{e.preventDefault();e.stopPropagation();openSettings();});
  document.addEventListener('click',(e)=>{const pop=document.getElementById('dropdownPop');if(pop&&!pop.classList.contains('hidden')&&!pop.contains(e.target)&&!e.target.closest('.composer-pill')&&!e.target.closest('.composer-icon'))closeDropdown();});
  document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){closeDropdown();closeSettings();}});
  window.addEventListener('resize',()=>{if(window.innerWidth>768){document.getElementById('sidebar').classList.remove('open');document.getElementById('detail').classList.remove('open');}});
  setInterval(()=>{ if(!document.hidden) refreshMarketData(); }, 20000);
});
</script>
